name: org-node-ui-lite
version: 1.0.0
enforcement: block

dependencies:
  deny:
    - "*"

mcp:
  self_defined: deny
  trust_transitive: false

compilation:
  target:
    allow:
      - claude
      - copilot
      - gemini
      - cursor
      - opencode
      - codex

manifest:
  scripts: deny

unmanaged_files:
  action: warn
