name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run check
      - run: npm test

  test-elisp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: emacs-eldev/setup-eldev@v1
        with:
          emacs-version: "29.4"
      - run: eldev compile
      - run: eldev test
