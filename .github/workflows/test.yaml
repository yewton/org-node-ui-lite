name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run check
      - run: npm test

  test-elisp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ["29.4", "30.1", "30.2"]
    steps:
      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: emacs-eldev/setup-eldev@v1
      - uses: actions/checkout@v4
      - run: eldev --packaged --debug --trace --time compile --warnings-as-errors
      - run: eldev --debug --trace --time test

  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ["29.4", "30.1", "30.2"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: emacs-eldev/setup-eldev@v1
      - run: npm install
      # Install eldev dependencies so emacs-server.el can load org-mem / org-node.
      - run: eldev prepare
      # Install Chromium to the same path used by the npm test:e2e script.
      - run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
