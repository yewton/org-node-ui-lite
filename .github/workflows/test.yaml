name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-apm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.x"
      - run: pip install apm-cli==0.12.1
      - run: apm audit --ci
      # `apm install` populates apm_modules/ so the drift check exercises the
      # same compile environment contributors have locally. The wrapper script
      # then stashes paths listed in apm-compile-stash.txt before invoking
      # `apm compile` — see issue #47 for why the stash is needed.
      - run: apm install
      - name: Verify compiled output is up to date
        run: |
          .apm/skills/apm/scripts/apm-compile.sh --stash-list apm-compile-stash.txt -t all
          if [ -n "$(git status --porcelain -- CLAUDE.md AGENTS.md GEMINI.md 'packages/frontend/src/CLAUDE.md' 'packages/frontend/src/AGENTS.md')" ]; then
            echo "Compiled output is out of date. Run 'apm install && .apm/skills/apm/scripts/apm-compile.sh --stash-list apm-compile-stash.txt -t all' locally and commit the result."
            git --no-pager diff -- CLAUDE.md AGENTS.md GEMINI.md packages/frontend/src/CLAUDE.md packages/frontend/src/AGENTS.md
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm test

  test-elisp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ["29.4", "30.1", "30.2"]
    steps:
      - uses: jcs090218/setup-emacs@a5b1cbb1af335d2e7bef99c0aa6e02cdad229182 # master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: emacs-eldev/setup-eldev@66eef997fb15bde4364c00acd4ee459f8be9f8b4 # v1.5
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache Eldev dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.eldev
          key: ${{ runner.os }}-eldev-${{ matrix.emacs-version }}-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-${{ matrix.emacs-version }}-
      - run: eldev --packaged --debug --trace --time compile --warnings-as-errors
      - run: eldev --debug --trace --time test

  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ["29.4", "30.1", "30.2"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - uses: jcs090218/setup-emacs@a5b1cbb1af335d2e7bef99c0aa6e02cdad229182 # master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: emacs-eldev/setup-eldev@66eef997fb15bde4364c00acd4ee459f8be9f8b4 # v1.5
      - run: npm ci
      - name: Cache Eldev dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.eldev
          key: ${{ runner.os }}-eldev-${{ matrix.emacs-version }}-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-${{ matrix.emacs-version }}-
      # Install eldev dependencies so emacs-server.el can load org-mem / org-node.
      - run: eldev prepare
      - name: Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: /opt/pw-browsers
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      # Install Chromium to the same path used by the npm test:e2e script.
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
      - name: Install Playwright dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: npm run test:e2e

  check-screenshots:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'pull_request' || github.event_name == 'push')
    outputs:
      should_run: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            frontend:
              - 'e2e/screenshots.spec.ts'
              - 'playwright.screenshots.config.ts'
              - 'packages/frontend/src/**'
              - 'packages/frontend/package.json'

  screenshots:
    needs: [test, test-elisp, test-e2e, check-screenshots]
    if: always() && needs.check-screenshots.outputs.should_run == 'true' && needs.test.result == 'success' && needs.test-elisp.result == 'success' && needs.test-e2e.result == 'success'
    runs-on: ubuntu-latest
    # Playwright Docker image has all browser deps pre-installed, avoiding
    # slow apt-get downloads on every run.
    # Keep this tag in sync with @playwright/test in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      # Ubuntu Noble (the Docker image base) ships Emacs 29.4 in the standard
      # repos, so no need for jcs090218/setup-emacs here.
      - name: Install Emacs
        run: apt-get install -y emacs
      - uses: emacs-eldev/setup-eldev@66eef997fb15bde4364c00acd4ee459f8be9f8b4 # v1.5
      - run: npm ci
      - name: Cache Eldev dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.eldev
          key: ${{ runner.os }}-eldev-29.4-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-29.4-
      - run: eldev prepare
      # Use npx directly instead of `npm run screenshots` because the npm
      # script hardcodes PLAYWRIGHT_BROWSERS_PATH=/opt/pw-browsers, which
      # conflicts with the Docker image's pre-installed path.
      - run: npx playwright test --config playwright.screenshots.config.ts
      - name: Upload screenshots artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshots
          path: docs/screenshots/
      - name: Create Pull Request for updated screenshots
        if: github.event_name == 'push'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore: update README screenshots"
          title: "chore: update README screenshots"
          body: "Automated PR to update README screenshots."
          branch: "bot/update-screenshots"
