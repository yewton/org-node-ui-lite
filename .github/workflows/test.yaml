name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run check
      - run: npm test

  test-elisp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ["29.4", "30.1", "30.2"]
    steps:
      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: emacs-eldev/setup-eldev@v1
      - uses: actions/checkout@v4
      - run: eldev --packaged --debug --trace --time compile --warnings-as-errors
      - run: eldev --debug --trace --time test

  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ["29.4", "30.1", "30.2"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: emacs-eldev/setup-eldev@v1
      - run: npm install
      # Install eldev dependencies so emacs-server.el can load org-mem / org-node.
      - run: eldev prepare
      # Cache Chromium binaries keyed on package-lock.json so a Playwright
      # version bump busts the cache while unchanged versions reuse it.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: /opt/pw-browsers
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      # Full install (browser + system deps) on cache miss; system deps only on hit.
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
      - run: npm run test:e2e
