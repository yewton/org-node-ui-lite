name: Update screenshots

on:
  push:
    branches-ignore: ["main"]
    paths:
      - "e2e/screenshots.spec.ts"
      - "playwright.screenshots.config.ts"
      - "packages/frontend/src/**"
      - "packages/frontend/package.json"
      - ".github/workflows/screenshots.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: jcs090218/setup-emacs@master
        with:
          version: "29.4"
      - uses: emacs-eldev/setup-eldev@v1
      - run: npm ci
      - name: Cache Eldev dependencies
        uses: actions/cache@v4
        with:
          path: ~/.eldev
          key: ${{ runner.os }}-eldev-29.4-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-29.4-
      - run: eldev prepare
      - name: Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: /opt/pw-browsers
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
      - name: Install Playwright dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run screenshots
      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "Screenshots unchanged, nothing to commit."
          else
            git commit -m "chore: update README screenshots [skip ci]"
            git push
          fi
